  "Desktop/CC/IOS Demo/PixelBeat": {project: "pixelbeat-ios", scenario: "ios_development", agent: "ios_agent"}
  "Desktop/CC/IOS Demo/pixel-beat-backend": {project: "pixelbeat-backend", scenario: "backend_api", agent: "backend_agent"}
  "Desktop/CC/IOS Demo/pupixel_pe_tool": {project: "pupixel-pe-tool", scenario: "web_frontend", agent: "web_agent"}
  "Desktop/CC/IOS Demo": {project: "pixelbeat", scenario: "ios_development", agent: "ios_agent"}
  # MemoryCollector
  "Desktop/CC/MemoryCollector": {project: "memory-collector", scenario: "ios_development", agent: "ios_agent"}
  # IPGuard
  "Desktop/CC/IPGuard": {project: "ipguard", scenario: "ios_development", agent: "ios_agent"}
  # Dog Story 系列
  "Desktop/社交贴纸产品设计/ios-app": {project: "dog-story-ios", scenario: "ios_development", agent: "ios_agent"}
  "Desktop/社交贴纸产品设计/backend": {project: "dog-story-backend", scenario: "backend_api", agent: "backend_agent"}
  "Desktop/社交贴纸产品设计/sticker-vision": {project: "sticker-vision", scenario: "backend_api", agent: "backend_agent"}
  "Desktop/社交贴纸产品设计/spot-playground": {project: "spot-playground", scenario: "web_frontend", agent: "web_agent"}
  "Desktop/社交贴纸产品设计/gossip-dog-debug": {project: "gossip-dog-debug", scenario: "web_frontend", agent: "web_agent"}
