##############################################################################
# Agent Workforce — 全局配置
##############################################################################

# ─── 飞书群 ───
feishu:
  webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/6ef37044-4824-483b-a83e-fcd266554f71"

# ─── 本地 LLM (夜间评测用) ───
local_llm:
  url: "http://localhost:8801/v1/chat/completions"
  model: "qwen3.5-35b"
  max_tokens: 2000
  temperature: 0.3

# ─── 模型分配 ───
model_allocation:
  orchestrator: "opus"
  ios_agent: "sonnet"
  backend_agent: "sonnet"
  web_agent: "sonnet"
  data_agent: "sonnet"
  infra_agent: "sonnet"
  reviewer: "sonnet"
  netops_agent: "sonnet"

# ─── 评测配置 ───
evaluation:
  # 夜间评测时间 (cron)
  schedule: "0 2 * * *"    # 每天凌晨 2 点
  # 自动升级阈值: 回归测试 score 提升超过此值则自动升级
  auto_upgrade_threshold: 0.05   # 5%
  # Golden example 回放数量
  regression_sample_size: 10
  # 失败模式需要出现几次才触发改进提案
  failure_pattern_min_count: 3

# ─── Trace 配置 ───
trace:
  # 隐式信号计算
  commit_delay_threshold_min: 5    # <5min = 直接用了
  post_edit_ratio_threshold: 0.15  # <15% = 满意
  follow_up_alert_threshold: 3     # >3 轮 = 理解力差

# ─── 服务端 ───
server:
  url: "http://118.196.147.14:9100"
  db_path: "/data/agent-workforce/traces.db"

# ─── 项目 → Agent 映射 (唯一配置源) ───
